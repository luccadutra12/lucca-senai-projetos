<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Boletim Escolar</title>

  <style>
    body {
      background: #121212;
      color: #fff;
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: #1e1e1e;
      padding: 25px;
      border-radius: 10px;
      width: 350px;
    }

    h1 {
      text-align: center;
      color: #4da3ff;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #4da3ff;
      border: none;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

    #resultado {
      margin-top: 15px;
    }

    .aprovado {
      color: #00c853;
      font-weight: bold;
    }

    .reprovado {
      color: #ff5252;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Boletim Escolar</h1>

    <button onclick="gerarBoletim()">Gerar Boletim</button>

    <div id="resultado"></div>
  </div>

  <!-- IMPORTANTE: script no final -->
  <script src="script.js"></script>

</body>
</html>

<h1>Contato</h1>
<p>Entre em contato conosco preenchendo o formulário abaixo:</p>
<form>
  <label for="nome">Nome:</label>
  <input type="text" id="nome" name="nome" required><br><br>
  <label for="email">Email:</label>
  <input type="email" id="email" name="email" required><br><br>
  <label for="mensagem">Mensagem:</label><br>
  <textarea id="mensagem" name="mensagem" rows="5" cols="40" required></textarea><br><br>
  <input type="submit" value="Enviar">
  <h3>Caso prefira</h3>
  <p>Ligue para (11) 1234-5678</p>
  <p>E agende uma reunião conosco!</p>
</form>
<button onclick="location.href='index.html'">Voltar para a Página Inicial</button>

<form action="processar_cadastro.php" method="post">
  <h1>Cadastro</h1>
  <p>Preencha os campos abaixo para se cadastrar:</p>
  <label for="nome">Nome:</label>
  <input type="text" id="nome" name="nome" required placeholder="Seu nome completo">
  <br><br>
  <label for="idade">Idade:</label>
  <input type="number" id="idade" name="idade" required placeholder="Sua idade">
  <br><br>
  <label for="curso">Curso:</label>
  <select id="curso" name="curso" required>
    <option value="">Selecione um curso</option>
    <option value="html">Curso de HTML</option>
    <option value="css">Curso de CSS</option>
    <option value="javascript">Curso de JavaScript</option>
  </select>
  <br><br>
  <label for="turno">Turno:</label>
  <select id="turno" name="turno" required>
    <option value="">Selecione um turno</option>
    <option value="manha">Manhã</option>
    <option value="tarde">Tarde</option>
    <option value="noite">Noite</option>
  </select>
  <br><br>
  <label for="email">Email:</label>
  <input type="email" id="email" name="email" required placeholder="Seu melhor email">
  <br><br>
  <label for="senha">Senha:</label>
  <input type="password" id="senha" name="senha" required placeholder="Crie uma senha segura">
  <br><br>
   <a href="sucesso.html">Cadastrar</a>
</form>
